name: Job Alert Cron

on:
  schedule:
    # GitHub Actions cannot reliably run faster than ~5 minutes (and it throttles
    # under load), so this is the practical floor here. For true 1-2 minute
    # checking, run the always-on poller instead:  cd backend && npm run poll
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: job-alert-cron
  cancel-in-progress: false

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Playwright browsers and system dependencies
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Run job alert engine
        working-directory: backend
        # Non-secret config (LinkedIn URL, keyword filter, etc.) comes from the
        # committed backend/.env. Only the Firebase key is a GitHub Secret,
        # because committing it to a public repo gets it auto-revoked by Google.
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm start
