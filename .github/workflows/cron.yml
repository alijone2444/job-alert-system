name: Job Alert Cron

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: job-alert-cron
  cancel-in-progress: false

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Playwright browsers and system dependencies
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Run job alert engine
        working-directory: backend
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          UPWORK_RSS_URL: ${{ secrets.UPWORK_RSS_URL }}
          LINKEDIN_SEARCH_URL: ${{ secrets.LINKEDIN_SEARCH_URL }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          KEYWORD_FILTER: ${{ secrets.KEYWORD_FILTER }}
          MAX_JOBS_PER_RUN: ${{ secrets.MAX_JOBS_PER_RUN }}
        run: npm start
